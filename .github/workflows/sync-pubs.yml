name: Sync Publications

on:
  schedule:
    # Run daily at 06:00 UTC (10 PM PST)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SCHOLAR_EMAIL: ${{ secrets.SCHOLAR_EMAIL }}
      SCHOLAR_PASSWORD: ${{ secrets.SCHOLAR_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      # Workaround: upstream labpubs build excludes the ingest/ module.
      # Patch the installed package from the git source until the next release.
      - name: Patch labpubs from git source
        run: |
          LABPUBS_DIR=$(uv run python -c "import labpubs, pathlib; print(pathlib.Path(labpubs.__file__).parent)")
          if [ ! -d "$LABPUBS_DIR/ingest" ]; then
            git clone --depth 1 https://github.com/nniiicc/labpubs.git /tmp/labpubs-src
            cp -r /tmp/labpubs-src/labpubs/ingest "$LABPUBS_DIR/ingest"
            cp /tmp/labpubs-src/labpubs/cli.py "$LABPUBS_DIR/cli.py"
            cp /tmp/labpubs-src/labpubs/config.py "$LABPUBS_DIR/config.py"
            cp /tmp/labpubs-src/labpubs/core.py "$LABPUBS_DIR/core.py"
            cp /tmp/labpubs-src/labpubs/models.py "$LABPUBS_DIR/models.py"
            cp /tmp/labpubs-src/labpubs/store.py "$LABPUBS_DIR/store.py"
            rm -rf /tmp/labpubs-src
          fi

      - name: Inject Slack webhook into config
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: |
          sed -i 's|\${SLACK_WEBHOOK_URL}|'"$SLACK_WEBHOOK_URL"'|g' labpubs.yaml

      # Incremental sync: labpubs reads last_sync from pubs.db and only
      # fetches publications published after that date. The DB must be
      # committed to the repo for this to work across runs.
      - name: Sync new publications
        id: sync
        run: |
          output=$(uv run labpubs -c labpubs.yaml sync 2>&1) || true
          echo "$output"
          new_count=$(echo "$output" | grep -oP 'New publications: \K\d+' || echo "0")
          echo "new_count=$new_count" >> "$GITHUB_OUTPUT"

      # Ingest Google Scholar alert emails (if credentials are configured)
      - name: Ingest Scholar alerts
        id: ingest
        continue-on-error: true
        if: ${{ env.SCHOLAR_EMAIL != '' && env.SCHOLAR_PASSWORD != '' }}
        run: |
          output=$(uv run labpubs -c labpubs.yaml ingest scholar-alerts 2>&1) || true
          echo "$output"
          ingest_count=$(echo "$output" | grep -oP 'New publications: \K\d+' || echo "0")
          echo "ingest_count=$ingest_count" >> "$GITHUB_OUTPUT"

      # Link scholar-alert works to researchers (idempotent; no-op if
      # no orphaned works exist).
      - name: Link Scholar alert works to researchers
        run: uv run python scripts/link_scholar_works.py

      # Only notify Slack when sync or ingest found new publications
      - name: Notify Slack of new publications
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' && (steps.sync.outputs.new_count != '0' || steps.ingest.outputs.ingest_count != '0') }}
        run: uv run python notify.py --days 1

      - name: Commit and push database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in pubs.db pubs.bib pubs.json; do [ -f "$f" ] && git add "$f"; done
          git diff --cached --quiet || git commit -m "chore: sync publications $(date -u +%Y-%m-%d)"
          git push
