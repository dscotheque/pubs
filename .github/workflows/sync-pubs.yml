name: Sync Publications

on:
  schedule:
    # Run daily at 06:00 UTC (10 PM PST)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Inject Slack webhook into config
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        run: |
          sed -i 's|\${SLACK_WEBHOOK_URL}|'"$SLACK_WEBHOOK_URL"'|g' labpubs.yaml

      # Incremental sync: labpubs reads last_sync from pubs.db and only
      # fetches publications published after that date. The DB must be
      # committed to the repo for this to work across runs.
      - name: Sync new publications
        id: sync
        run: |
          output=$(uv run labpubs -c labpubs.yaml sync 2>&1)
          echo "$output"
          new_count=$(echo "$output" | grep -oP 'New publications: \K\d+' || echo "0")
          echo "new_count=$new_count" >> "$GITHUB_OUTPUT"

      # Only notify Slack when the sync actually found new publications
      - name: Notify Slack of new publications
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' && steps.sync.outputs.new_count != '0' }}
        run: uv run labpubs -c labpubs.yaml notify --days 1

      - name: Commit and push database changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubs.db pubs.bib pubs.json
          git diff --cached --quiet || git commit -m "chore: sync publications $(date -u +%Y-%m-%d)"
          git push
