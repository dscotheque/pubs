name: Bootstrap Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create add-researcher label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create add-researcher \
            --color 0075ca \
            --description "Add a new researcher to DSCO publication tracking" \
            --force
